<main class="bg-[#F8F5EF] text-[#1C1C1C]">
  <!-- HERO VIDEO -->
  <section class="relative bg-white">
    <div class="h-175 w-full relative overflow-hidden group cursor-pointer">
      <video
        #myVideo
        [src]="assets.video"
        class="h-full w-full object-cover"
        [poster]="assets.poster"
        loop
        muted
        playsinline
        (play)="onPlay()"
        (pause)="onPause()"
      ></video>

      <div
        class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity duration-500"
      ></div>

      <button
        type="button"
        (click)="toggleVideo(myVideo)"
        hlmBtn
        class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-24 rounded-full bg-white/10 backdrop-blur-[2px] border border-white/20 grid place-items-center text-white opacity-0 scale-90 group-hover:opacity-100 group-hover:scale-100 transition-all duration-300"
      >
        <lucide-icon
          [img]="icons.Play"
          *ngIf="!isPlaying()"
          [size]="48"
          strokeWidth="2"
          class="fill-white ml-1"
        >
        </lucide-icon>

        <lucide-icon
          *ngIf="isPlaying()"
          [img]="icons.Pause"
          [size]="48"
          strokeWidth="2"
          class="fill-white"
        >
        </lucide-icon>
      </button>
    </div>
  </section>

  <!-- TITLE -->
  <section class="bg-white py-14 text-center">
    <h1 class="font-heading font-semibold text-[40px] text-[#1C1C1C]">Take a tour</h1>
  </section>

  <section class="mx-auto max-w-7xl px-6 py-16 md:px-10 md:py-20">
    <div class="mb-12 max-w-3xl">
      <p class="text-sm font-black uppercase tracking-[0.3em] text-[#7C6A46]">Highlights</p>
      <h2 class="mt-4 text-3xl font-black md:text-4xl">A clearer look at the spaces behind the stay</h2>
    </div>

    <div class="grid gap-8">
      <article
        *ngFor="let item of highlights; let i = index"
        class="grid items-center gap-6 overflow-hidden rounded-[2rem] bg-white shadow-2xl shadow-black/[0.04] lg:grid-cols-2"
      >
        <div [ngClass]="i % 2 === 1 ? 'lg:order-2' : ''" class="h-full">
          <img [src]="item.image" [alt]="item.title" class="h-72 w-full object-cover md:h-[30rem]" />
        </div>

        <div [ngClass]="i % 2 === 1 ? 'lg:order-1' : ''" class="p-8 md:p-12">
          <p class="text-sm font-black uppercase tracking-[0.3em] text-[#00A699]">{{ item.eyebrow }}</p>
          <h3 class="mt-4 font-heading text-3xl font-black text-[#1C1C1C]">{{ item.title }}</h3>
          <p class="mt-5 text-base font-medium leading-8 text-[#1C1C1C]/65">
            {{ item.description }}
          </p>

          <div class="mt-8 inline-flex rounded-full bg-[#7C6A46]/10 px-4 py-2 text-sm font-bold text-[#7C6A46]">
            Paradise Hotel Tour Stop {{ i + 1 }}
          </div>
        </div>
      </article>
    </div>
  </section>
</main>
