<div class="min-h-[80vh] flex items-center justify-center p-6 bg-gray-50">
  <div
    class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 transition-all duration-300 hover:shadow-2xl"
  >
    <!-- Header with Background -->
    <div
      class="h-32 bg-[url('/assets/images/hero.jpg')] bg-cover bg-center relative flex items-center justify-center"
    >
      <div class="absolute inset-0 bg-black/40"></div>
      <h2 class="relative text-white text-3xl font-bold tracking-tight">Welcome Back</h2>
    </div>

    <div class="p-10">
      <p class="text-gray-500 text-center mb-8 font-light">Login to manage your reservations</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Email Field -->
        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-2"
            >Email Address</label
          >
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="example@hotel.com"
            class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none transition-all duration-200 focus:border-[#8c7b64] focus:ring-2 focus:ring-[#8c7b64]/10"
            [class.border-red-500]="
              loginForm.get('email')?.invalid && loginForm.get('email')?.touched
            "
          />
          <span class="text-xs text-red-500 mt-1 block h-4">
            <span
              *ngIf="loginForm.get('email')?.errors?.['email'] && loginForm.get('email')?.touched"
            >
              Invalid email address
            </span>

            <span
              *ngIf="
                loginForm.get('email')?.errors?.['required'] && loginForm.get('email')?.touched
              "
            >
              Email is required
            </span>
          </span>
        </div>

        <!-- Password Field -->
        <div>
          <div class="flex justify-between items-center mb-2">
            <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
            <a
              routerLink="/forgot-password"
              class="text-xs text-[#8c7b64] hover:underline font-medium"
              >Forgot?</a
            >
          </div>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none transition-all duration-200 focus:border-[#8c7b64] focus:ring-2 focus:ring-[#8c7b64]/10"
            [class.border-red-500]="
              loginForm.get('password')?.invalid && loginForm.get('password')?.touched
            "
          />
          <span class="text-xs text-red-500 mt-1 block h-4">
            <span
              *ngIf="
                loginForm.get('password')?.errors?.['minlength'] &&
                loginForm.get('password')?.touched
              "
              >Must be at least 6 characters</span
            >
            <span
              *ngIf="
                loginForm.get('password')?.errors?.['required'] &&
                loginForm.get('password')?.touched
              "
              >Password is required</span
            >
          </span>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="loginForm.invalid"
          class="w-full py-3 px-4 bg-[#8c7b64] hover:bg-[#766450] disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-bold rounded-lg transition-all duration-300 transform hover:-translate-y-0.5 shadow-md hover:shadow-lg uppercase tracking-wider text-sm"
        >
          Login
        </button>
      </form>

      <!-- Footer Action -->
      <p class="mt-8 text-center text-sm text-gray-500">
        Don't have an account?
        <a routerLink="/register" class="text-[#8c7b64] font-bold hover:underline">Create one</a>
      </p>
    </div>
  </div>
</div>
