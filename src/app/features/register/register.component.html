<div class="min-h-screen py-20 flex items-center justify-center p-6 bg-gray-50">
  <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 transition-all duration-300 hover:shadow-2xl">
    <!-- Header with Background -->
    <div class="h-32 bg-[url('/assets/images/hero.jpg')] bg-cover bg-center relative flex items-center justify-center">
      <div class="absolute inset-0 bg-black/40"></div>
      <h2 class="relative text-white text-3xl font-bold tracking-tight">Create Account</h2>
    </div>

    <div class="p-10">
      <p class="text-gray-500 text-center mb-8 font-light">Join us for your next luxury stay</p>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Email Field -->
          <div class="col-span-2">
            <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="example@hotel.com"
              class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none transition-all duration-200 focus:border-[#8c7b64] focus:ring-2 focus:ring-[#8c7b64]/10"
              [class.border-red-500]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
            />
            <span class="text-xs text-red-500 mt-1 block h-4">
              <span *ngIf="registerForm.get('email')?.errors?.['email'] && registerForm.get('email')?.touched">Invalid email address</span>
              <span *ngIf="registerForm.get('email')?.errors?.['required'] && registerForm.get('email')?.touched">Email is required</span>
            </span>
          </div>

          <!-- Phone Field -->
          <div class="col-span-2 md:col-span-1">
            <label for="phone" class="block text-sm font-semibold text-gray-700 mb-2">Phone Number</label>
            <input
              id="phone"
              type="tel"
              formControlName="phone"
              placeholder="0123456789"
              class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none transition-all duration-200 focus:border-[#8c7b64] focus:ring-2 focus:ring-[#8c7b64]/10"
              [class.border-red-500]="registerForm.get('phone')?.invalid && registerForm.get('phone')?.touched"
            />
            <span class="text-xs text-red-500 mt-1 block h-4">
              <span *ngIf="registerForm.get('phone')?.errors?.['pattern'] && registerForm.get('phone')?.touched">Invalid phone (10 digits)</span>
              <span *ngIf="registerForm.get('phone')?.errors?.['required'] && registerForm.get('phone')?.touched">Phone is required</span>
            </span>
          </div>

          <!-- Password Field -->
          <div class="col-span-2 md:col-span-1">
            <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
            <input
              id="password"
              type="password"
              formControlName="password"
              placeholder="••••••••"
              class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none transition-all duration-200 focus:border-[#8c7b64] focus:ring-2 focus:ring-[#8c7b64]/10"
              [class.border-red-500]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
            />
            <span class="text-xs text-red-500 mt-1 block h-4">
              <span *ngIf="registerForm.get('password')?.errors?.['minlength'] && registerForm.get('password')?.touched">Must be at least 6 characters</span>
              <span *ngIf="registerForm.get('password')?.errors?.['required'] && registerForm.get('password')?.touched">Password is required</span>
            </span>
          </div>

          <!-- Confirm Password Field -->
          <div class="col-span-2">
            <label for="confirmPassword" class="block text-sm font-semibold text-gray-700 mb-2">Confirm Password</label>
            <input
              id="confirmPassword"
              type="password"
              formControlName="confirmPassword"
              placeholder="••••••••"
              class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none transition-all duration-200 focus:border-[#8c7b64] focus:ring-2 focus:ring-[#8c7b64]/10"
              [class.border-red-500]="(registerForm.get('confirmPassword')?.touched && registerForm.errors?.['mismatch'])"
            />
            <span class="text-xs text-red-500 mt-1 block h-4">
              <span *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched">Passwords do not match</span>
              <span *ngIf="registerForm.get('confirmPassword')?.errors?.['required'] && registerForm.get('confirmPassword')?.touched">Please confirm your password</span>
            </span>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="registerForm.invalid"
          class="w-full py-3 px-4 bg-[#8c7b64] hover:bg-[#766450] disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-bold rounded-lg transition-all duration-300 transform hover:-translate-y-1 shadow-md hover:shadow-xl uppercase tracking-wider text-sm mt-4"
        >
          Create Account
        </button>
      </form>

      <!-- Footer Action -->
      <p class="mt-8 text-center text-sm text-gray-500">
        Already have an account? 
        <a routerLink="/login" class="text-[#8c7b64] font-bold hover:underline">Log in</a>
      </p>
    </div>
  </div>
</div>
