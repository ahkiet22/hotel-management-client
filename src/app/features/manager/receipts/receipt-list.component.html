<section class="space-y-6">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Receipt Management</h1>
      <p class="text-sm text-slate-500 mt-1 font-medium">Invoices and payment receipts</p>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-slate-50/50 border-b border-slate-100">
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest leading-none">Invoice No</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest leading-none">Booking ID</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest leading-none">Total Amount</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest leading-none">Issued Date</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest leading-none">Issued By</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest leading-none">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-50">
          <tr *ngFor="let rcpt of receipts()" class="hover:bg-slate-50/50 transition-colors group">
            <td class="px-6 py-5 font-bold text-blue-600 text-sm italic">
              {{ rcpt.invoice_number }}
            </td>
            <td class="px-6 py-5 text-sm text-slate-600">
              {{ rcpt.booking_id }}
            </td>
            <td class="px-6 py-5">
              <span class="text-sm font-bold text-slate-900">${{ rcpt.total_amount }}</span>
            </td>
            <td class="px-6 py-5 text-sm text-slate-500">
              {{ rcpt.issued_date | date:'medium' }}
            </td>
            <td class="px-6 py-5 text-sm font-medium text-slate-600">
              {{ rcpt.issued_by }}
            </td>
            <td class="px-6 py-5">
              <div class="flex items-center gap-2">
                <button class="p-2 rounded-lg hover:bg-blue-50 text-blue-500 transition-colors" title="Download">
                  <lucide-icon [img]="icons.Download" class="w-4 h-4"></lucide-icon>
                </button>
                <button class="p-2 rounded-lg hover:bg-slate-100 text-slate-500 transition-colors" title="Print">
                  <lucide-icon [img]="icons.Printer" class="w-4 h-4"></lucide-icon>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
