<app-ui-modal 
  [isOpen]="isOpen" 
  [title]="isEdit() ? 'Edit Room Type' : 'Create New Room Type'"
  (close)="close.emit()"
>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
    <!-- Name -->
    <div class="space-y-2">
      <label hlmLabel>Room Type Name</label>
      <input 
        hlmInput
        type="text" 
        formControlName="name"
        placeholder="e.g. Deluxe Suite"
        class="w-full"
        [error]="form.get('name')?.invalid && form.get('name')?.touched ? true : 'auto'"
      />
      <p *ngIf="form.get('name')?.invalid && form.get('name')?.touched" class="text-[11px] text-destructive font-bold ml-1">
        Name is required and must be under 50 characters.
      </p>
    </div>

    <!-- Description -->
    <div class="space-y-2">
      <label hlmLabel>Description</label>
      <textarea 
        hlmInput
        formControlName="description"
        placeholder="Describe the room type features..."
        rows="3"
        class="w-full h-auto min-h-[100px]"
      ></textarea>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <!-- Base Price -->
      <div class="space-y-2">
        <label hlmLabel>Base Price ($)</label>
        <input 
          hlmInput
          type="number" 
          formControlName="basePrice"
          class="w-full"
          [error]="form.get('basePrice')?.invalid && form.get('basePrice')?.touched ? true : 'auto'"
        />
      </div>

      <!-- Capacity -->
      <div class="space-y-2">
        <label hlmLabel>Capacity (Adults)</label>
        <input 
          hlmInput
          type="number" 
          formControlName="capacity"
          class="w-full"
          [error]="form.get('capacity')?.invalid && form.get('capacity')?.touched ? true : 'auto'"
        />
      </div>
    </div>

    <!-- Images -->
    <div class="space-y-4">
      <label hlmLabel>Room Type Images</label>
      
      <div class="grid grid-cols-4 gap-2">
        <div *ngFor="let img of form.get('images')?.value; let i = index" class="relative group aspect-square rounded-xl overflow-hidden border border-slate-200">
          <img [src]="img" class="w-full h-full object-cover">
          <button (click)="removeImage(i)" class="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        
        <label *ngIf="!isUploading()" class="flex flex-col items-center justify-center aspect-square rounded-xl border-2 border-dashed border-slate-300 hover:border-blue-500 hover:bg-blue-50 cursor-pointer transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          <span class="text-[10px] font-bold text-slate-400 mt-1 uppercase">Upload</span>
          <input type="file" multiple (change)="onFileSelected($event)" class="hidden" accept="image/*">
        </label>

        <div *ngIf="isUploading()" class="flex items-center justify-center aspect-square rounded-xl border-2 border-dashed border-slate-300">
          <div class="w-5 h-5 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        </div>
      </div>
    </div>

    <!-- Hidden Submit for Enter key -->
    <button type="submit" class="hidden"></button>
  </form>

  <div footer class="flex gap-3">
    <button 
      hlmBtn 
      (click)="onSubmit()"
      class="bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl px-6 py-2"
    >
      {{ isEdit() ? 'Update Room Type' : 'Create Room Type' }}
    </button>
  </div>
</app-ui-modal>
