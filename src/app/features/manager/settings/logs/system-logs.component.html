<section class="space-y-6">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight flex items-center gap-3">
        <lucide-icon [img]="icons.Shield" class="w-6 h-6 text-blue-600"></lucide-icon>
        System Logs
      </h1>
      <p class="text-sm text-slate-500 mt-1 font-medium">Tracking all system events and user actions</p>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
    <div class="p-6">
      <div class="space-y-6">
        <div *ngFor="let log of logs(); let isLast = last" class="group relative">
          <div class="flex gap-4">
            <!-- Icon/Timeline -->
            <div class="flex flex-col items-center">
              <div 
                [ngClass]="log.description.includes('ERROR') ? 'bg-red-50 text-red-500' : 'bg-blue-50 text-blue-500'"
                class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0 shadow-sm transition-transform group-hover:scale-110"
              >
                <lucide-icon [img]="log.description.includes('ERROR') ? icons.Shield : icons.Activity" class="w-5 h-5"></lucide-icon>
              </div>
              <div *ngIf="!isLast" class="w-px h-full bg-slate-100 mt-2"></div>
            </div>

            <!-- Content -->
            <div class="flex-1 pb-10">
              <div class="flex flex-wrap items-center justify-between gap-2 mb-2">
                <div class="flex items-center gap-3">
                  <span class="font-mono text-sm px-2 py-1 bg-slate-100 text-slate-700 rounded-md font-bold">
                    {{ log.action }}
                  </span>
                  <span class="text-xs font-semibold text-slate-400 flex items-center gap-1">
                    <lucide-icon [img]="icons.Clock" class="w-3 h-3"></lucide-icon>
                    {{ log.created_at | date:'MMM d, y, h:mm:ss a' }}
                  </span>
                </div>
                <div class="flex items-center gap-2">
                  <span *ngIf="log.ip" class="text-[10px] font-bold px-2 py-0.5 bg-slate-50 text-slate-500 rounded-full border border-slate-100">
                    IP: {{ log.ip }}
                  </span>
                </div>
              </div>

              <div 
                [ngClass]="log.description.includes('ERROR') ? 'bg-red-50/50 border-red-100 text-red-700' : 'bg-slate-50 border-slate-100 text-slate-700'"
                class="p-4 rounded-xl border font-mono text-xs leading-relaxed break-all"
              >
                {{ log.description }}
              </div>

              <div class="mt-3 flex items-center gap-4 text-[11px] text-slate-400 font-medium">
                <span class="flex items-center gap-1">
                  <span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span>
                  User ID: <span class="text-slate-600 truncate max-w-[120px]">{{ log.user_id }}</span>
                </span>
                <span *ngIf="log.user_agent" class="flex items-center gap-1 truncate max-w-md">
                  <span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span>
                  Agent: <span class="text-slate-500 truncate italic">{{ log.user_agent }}</span>
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div *ngIf="logs().length === 0" class="py-20 text-center">
        <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-300">
          <lucide-icon [img]="icons.Activity" class="w-10 h-10"></lucide-icon>
        </div>
        <h3 class="text-lg font-bold text-slate-900">No logs found</h3>
        <p class="text-slate-500">System is clean. No events recorded yet.</p>
      </div>
    </div>
  </div>
</section>
