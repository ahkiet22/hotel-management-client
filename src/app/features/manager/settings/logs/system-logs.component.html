<section class="space-y-6">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight flex items-center gap-3">
        <lucide-icon [img]="icons.Shield" class="w-6 h-6 text-blue-600"></lucide-icon>
        System Logs
      </h1>
      <p class="text-sm text-slate-500 mt-1 font-medium">Tracking all system events and user actions</p>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
    <div class="p-6">
      <div class="flow-root">
        <ul role="list" class="-mb-8">
          <li *ngFor="let log of logs(); let isLast = last">
            <div class="relative pb-8">
              <span *ngIf="!isLast" class="absolute left-4 top-4 -ml-px h-full w-0.5 bg-slate-100" aria-hidden="true"></span>
              <div class="relative flex space-x-3">
                <div>
                  <span class="h-8 w-8 rounded-full bg-blue-50 flex items-center justify-center ring-8 ring-white">
                    <lucide-icon [img]="icons.Activity" class="w-4 h-4 text-blue-500"></lucide-icon>
                  </span>
                </div>
                <div class="flex min-w-0 flex-1 justify-between space-x-4 pt-1.5">
                  <div>
                    <p class="text-sm font-bold text-slate-900">
                      {{ log.action }} <span class="font-medium text-slate-500 italic ml-2">by {{ log.user_id }}</span>
                    </p>
                    <p class="mt-1 text-sm text-slate-600 leading-relaxed">{{ log.description }}</p>
                  </div>
                  <div class="whitespace-nowrap text-right text-xs font-semibold text-slate-400">
                    <time [dateTime]="log.created_at">{{ log.created_at | date:'shortTime' }}</time>
                    <p class="mt-1">{{ log.created_at | date:'mediumDate' }}</p>
                  </div>
                </div>
              </div>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </div>
</section>
