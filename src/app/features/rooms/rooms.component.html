<div class="font-sans text-gray-800 flex flex-col">
  <!-- Hero Section -->
  <section class="relative w-full h-[70vh] min-h-120 bg-[url('assets/images/hero.jpg')] bg-cover bg-center flex items-center justify-center text-center text-white">
    <div class="absolute inset-0 bg-black/40"></div>
    <div class="relative z-10 max-w-3xl px-5">
      <h1 class="text-5xl md:text-5xl max-md:text-4xl font-bold mb-6 tracking-wide">Rooms and Suites</h1>
      <p class="text-lg leading-relaxed mb-12 font-light text-white/90">
        The elegant luxury bedrooms in this gallery showcase custom interior<br class="hidden md:block">
        designs & decorating ideas. View pictures and find your<br class="hidden md:block">
        perfect luxury bedroom design.
      </p>
      
      <button class="bg-transparent border-2  border-white/60 text-white w-12 h-20 rounded-full inline-flex items-center justify-center cursor-pointer transition-all duration-300 hover:bg-white/20 hover:-translate-y-1" aria-label="Scroll down">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <polyline points="19 12 12 19 5 12"></polyline>
        </svg>
      </button>
    </div>
  </section>

  <!-- Rooms Grid Section -->
  <section class="py-20 px-6 md:px-10 bg-gray-50 flex justify-center">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl w-full">
      
      <div class="bg-white rounded overflow-hidden shadow-[0_4px_12px_rgba(0,0,0,0.06)] transition-all duration-300 hover:shadow-[0_12px_24px_rgba(0,0,0,0.12)] hover:-translate-y-1 flex flex-col group" *ngFor="let room of rooms">
        <div class="w-full h-60 overflow-hidden">
          <img [src]="room.imageUrl" alt="Room Photo" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
        </div>
        <div class="p-6 flex flex-col grow">
          <div class="flex justify-between items-center mb-2">
             <h3 class="m-0 text-xl font-semibold text-gray-900">{{ room.title }}</h3>
             <span class="text-sm text-gray-500" [class.text-green-600]="room.isAvailable">Available: {{ room.isAvailable ? 'Yes' : 'No' }}</span>
          </div>
          <p class="text-lg text-[#8c7b64] mt-0 mb-6 font-semibold">{{ room.price }}</p>
          
          <div class="flex justify-between items-center mt-auto border-t border-gray-100 pt-4">
            <div class="flex gap-3">
              <span class="w-8 h-8 rounded-full bg-gray-100 text-gray-400 inline-flex items-center justify-center">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg>
              </span>
              <span class="w-8 h-8 rounded-full bg-gray-100 text-gray-400 inline-flex items-center justify-center">
                 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
              </span>
              <span class="w-8 h-8 rounded-full bg-gray-100 text-gray-400 inline-flex items-center justify-center">
                 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>
              </span>
            </div>
            
            <button class="bg-[#8c7b64] hover:bg-[#766450] text-white border-none py-2 px-5 text-sm font-medium rounded cursor-pointer transition-colors duration-200 uppercase tracking-wide">
              Book now
            </button>
          </div>
        </div>
      </div>
      
    </div>
  </section>
</div>
