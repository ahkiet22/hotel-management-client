<div class="min-h-[80vh] flex items-center justify-center p-6 bg-gray-50">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 transition-all duration-300 hover:shadow-2xl">
    <!-- Header with Background -->
    <div class="h-32 bg-[url('/assets/images/hero.jpg')] bg-cover bg-center relative flex items-center justify-center">
      <div class="absolute inset-0 bg-black/40"></div>
      <h2 class="relative text-white text-3xl font-bold tracking-tight">Recover Password</h2>
    </div>

    <div class="p-10">
      <p class="text-gray-500 text-center mb-8 font-light">Enter your email to receive recovery instructions</p>

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Email Field -->
        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="example@hotel.com"
            class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none transition-all duration-200 focus:border-[#8c7b64] focus:ring-2 focus:ring-[#8c7b64]/10"
            [class.border-red-500]="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched"
          />
          <span class="text-xs text-red-500 mt-1 block h-4">
             <span *ngIf="forgotForm.get('email')?.errors?.['email'] && forgotForm.get('email')?.touched">Invalid email address</span>
             <span *ngIf="forgotForm.get('email')?.errors?.['required'] && forgotForm.get('email')?.touched">Email is required</span>
          </span>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="forgotForm.invalid"
          class="w-full py-3 px-4 bg-[#8c7b64] hover:bg-[#766450] disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-bold rounded-lg transition-all duration-300 transform hover:-translate-y-0.5 shadow-md hover:shadow-lg uppercase tracking-wider text-sm"
        >
          Send Reset Link
        </button>
      </form>

      <!-- Footer Action -->
      <p class="mt-8 text-center text-sm text-gray-500">
        Remember your password? 
        <a routerLink="/login" class="text-[#8c7b64] font-bold hover:underline">Log in</a>
      </p>
    </div>
  </div>
</div>
