<div class="flex min-h-screen bg-slate-50 font-sans">
  <aside
    class="fixed inset-y-0 left-0 z-50 bg-slate-900 text-slate-300 transition-all duration-300 ease-in-out flex flex-col shadow-2xl overflow-hidden"
    [class.w-64]="!isCollapsed()"
    [class.w-20]="isCollapsed()"
  >
    <div class="h-16 flex items-center px-6 border-b border-white/10 shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center shrink-0">
          <span class="text-white font-bold text-lg">P</span>
        </div>
        <div
          class="overflow-hidden transition-all duration-300"
          [class.w-0]="isCollapsed()"
          [class.w-32]="!isCollapsed()"
        >
          <span class="font-bold text-lg tracking-tight text-white whitespace-nowrap">
            PARADISE<span class="text-blue-500">HOTEL</span>
          </span>
        </div>
      </div>
    </div>

    <nav class="flex-1 overflow-y-auto py-6 px-3 scrollbar-hide space-y-1">
      <ng-container *ngFor="let item of menuItems">
        <a
          *ngIf="!item.children"
          [routerLink]="item.href"
          class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200 group relative"
          [ngClass]="{
            'bg-blue-600/10 text-blue-400': isActive(item.href),
            'hover:bg-white/5 hover:text-white': !isActive(item.href),
          }"
        >
          <lucide-icon
            [img]="item.icon"
            class="w-5 h-5 shrink-0 transition-transform group-hover:scale-110"
          ></lucide-icon>
          <span
            class="font-medium text-[14.5px] whitespace-nowrap transition-all duration-300"
            [class.opacity-0]="isCollapsed()"
            [class.translate-x-4]="isCollapsed()"
          >
            {{ item.title }}
          </span>
          <div
            *ngIf="isActive(item.href)"
            class="absolute left-0 w-1 h-6 bg-blue-500 rounded-r-full"
          ></div>
        </a>

        <div *ngIf="item.children" class="space-y-1">
          <button
            (click)="toggle(item.title)"
            class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl transition-all duration-200 group relative"
            [ngClass]="{
              'bg-blue-600/5 text-blue-400': toggleMap[item.title] && !isCollapsed(),
              'hover:bg-white/5 hover:text-white': !toggleMap[item.title] || isCollapsed(),
            }"
          >
            <div class="flex items-center gap-3">
              <lucide-icon
                [img]="item.icon"
                class="w-5 h-5 shrink-0 transition-transform group-hover:scale-110"
              ></lucide-icon>
              <span
                class="font-medium text-[14.5px] whitespace-nowrap transition-all duration-300"
                [class.opacity-0]="isCollapsed()"
                [class.translate-x-4]="isCollapsed()"
              >
                {{ item.title }}
              </span>
            </div>
            <lucide-icon
              [img]="icons.ChevronDown"
              class="w-4 h-4 transition-transform duration-300 opacity-60"
              [class.rotate-180]="toggleMap[item.title]"
              [class.hidden]="isCollapsed()"
            ></lucide-icon>
          </button>

          <div
            *ngIf="toggleMap[item.title] && !isCollapsed()"
            class="ml-6 mt-1 space-y-1 overflow-hidden transition-all animate-in fade-in slide-in-from-top-1"
          >
            <a
              *ngFor="let child of item.children"
              [routerLink]="child.href"
              class="block px-4 py-2 rounded-lg text-sm transition-all duration-200"
              [ngClass]="{
                'text-white font-medium bg-white/5': isActive(child.href),
                'text-slate-500 hover:text-white hover:bg-white/5': !isActive(child.href),
              }"
            >
              {{ child.title }}
            </a>
          </div>
        </div>
      </ng-container>
    </nav>

    <div class="p-4 border-t border-white/5 bg-slate-900/50 backdrop-blur-sm">
      <button
        class="w-full flex items-center p-2.5 rounded-xl text-red-400 hover:bg-red-500/10 transition-all duration-200 group"
      >
        <lucide-icon
          [img]="icons.LogOut"
          class="w-5 h-5 shrink-0 group-hover:-translate-x-1 transition-transform"
        ></lucide-icon>
        <span
          class="ml-3 font-medium text-[14.5px] transition-all duration-300"
          [class.hidden]="isCollapsed()"
        >
          Đăng xuất
        </span>
      </button>
    </div>
  </aside>

  <div
    class="flex flex-col flex-1 transition-all duration-300 ease-in-out"
    [style.margin-left]="isCollapsed() ? '5rem' : '16rem'"
  >
    <header
      class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-40"
    >
      <div class="flex items-center gap-4">
        <button
          (click)="toggleSidebar()"
          class="p-2 rounded-lg hover:bg-slate-100 text-slate-500 transition-colors"
          title="Toggle Sidebar"
        >
          <lucide-icon [img]="isCollapsed() ? icons.Menu : icons.X" class="w-5 h-5"></lucide-icon>
        </button>
        <h2 class="font-bold text-lg text-slate-800 tracking-tight">Manager Dashboard</h2>
      </div>

      <div class="flex items-center gap-4">
        <div class="flex flex-col items-end mr-2">
          <p class="text-[14px] font-bold text-slate-900 leading-tight">{{ auth.user()?.name }}</p>
          <p
            class="text-[11px] font-semibold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full mt-0.5"
          >
            ADMINISTRATOR
          </p>
        </div>
        <div
          class="w-10 h-10 rounded-xl bg-linear-to-br from-blue-500 to-indigo-600 border-2 border-white shadow-sm flex items-center justify-center text-white font-bold"
        >
          {{ auth.user()?.name?.substring(0, 1) }}
        </div>
      </div>
    </header>

    <main class="p-6">
      <div
        class="bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 min-h-[calc(100vh-160px)] p-6"
      >
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
