@if (shouldShow) {
  <div class="flex flex-col gap-3 border-t border-slate-100 px-6 py-4 md:flex-row md:items-center md:justify-between">
    <p class="text-sm font-medium text-slate-500">
      Showing page {{ meta.page }} of {{ meta.totalPages }} ({{ meta.totalItems }} items)
    </p>

    <div class="flex items-center gap-2">
      <button
        type="button"
        (click)="setPage(meta.page - 1)"
        [disabled]="meta.page === 1"
        class="rounded-lg border border-slate-200 px-3 py-1.5 text-sm font-semibold text-slate-600 transition-colors hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
      >
        Prev
      </button>

      @for (page of visiblePages; track page) {
        <button
          type="button"
          (click)="setPage(page)"
          class="min-w-9 rounded-lg border px-3 py-1.5 text-sm font-semibold transition-colors"
          [ngClass]="page === meta.page
            ? 'border-blue-600 bg-blue-600 text-white'
            : 'border-slate-200 text-slate-600 hover:bg-slate-50'"
        >
          {{ page }}
        </button>
      }

      <button
        type="button"
        (click)="setPage(meta.page + 1)"
        [disabled]="meta.page === meta.totalPages"
        class="rounded-lg border border-slate-200 px-3 py-1.5 text-sm font-semibold text-slate-600 transition-colors hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
      >
        Next
      </button>
    </div>
  </div>
}
