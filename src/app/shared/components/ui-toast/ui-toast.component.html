<div class="pointer-events-none fixed right-4 top-4 z-[9999] flex w-[min(92vw,380px)] flex-col gap-3">
  @for (toast of getToasts(); track toast.id) {
    <div
      class="pointer-events-auto rounded-xl border-l-4 p-4 shadow-lg"
      [class]="getContainerClass(toast.type)"
    >
      <div class="flex items-start justify-between gap-3">
        <div>
          <p class="text-sm font-bold" [class]="getTitleClass(toast.type)">
            {{ toast.title }}
          </p>
          @if (toast.message) {
            <p class="mt-1 text-sm text-slate-600">
              {{ toast.message }}
            </p>
          }
        </div>

        <button
          type="button"
          (click)="dismiss(toast.id)"
          class="rounded-md p-1 text-slate-400 transition-colors hover:bg-black/5 hover:text-slate-600"
        >
          <lucide-icon [img]="icons.X" class="h-4 w-4"></lucide-icon>
        </button>
      </div>
    </div>
  }
</div>
